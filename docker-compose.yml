services:
  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: hermes
    restart: unless-stopped
    command: gateway run
    stdin_open: true
    tty: true
    ports:
      - "127.0.0.1:8642:8642"
      - "127.0.0.1:9119:9119"
    volumes:
      - ./data:/opt/data
    env_file:
      - .env
    shm_size: "1g"
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
